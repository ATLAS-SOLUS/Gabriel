# netlify.toml — Configuração do Gabriel
# Este arquivo deve estar na RAIZ do repositório

[build]
  publish = "."
  functions = "netlify/functions"

# Callback OAuth do Google → auth-callback.html
[[redirects]]
  from   = "/auth/google/callback"
  to     = "/auth-callback.html"
  status = 200
  force  = true

# Headers de segurança e PWA
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

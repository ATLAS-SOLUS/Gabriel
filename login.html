<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Gabriel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F7F5; --surface: #FFFFFF; --border: #E8E8E4;
      --text-primary: #1A1A1A; --text-secondary: #787874; --text-hint: #ABABAB;
      --accent: #1A1A1A;
      --font-sans: 'DM Sans', sans-serif; --font-serif: 'DM Serif Display', serif;
    }
    html, body { height: 100%; background: var(--bg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow: hidden; }

    .app { height: 100%; display: flex; flex-direction: column; position: relative; }

    /* Decorations */
    .deco { position: absolute; border-radius: 50%; pointer-events: none; }
    .deco-1 { top: -100px; right: -80px; width: 320px; height: 320px; background: radial-gradient(circle, rgba(26,26,26,0.05) 0%, transparent 70%); }
    .deco-2 { bottom: 25%; left: -100px; width: 240px; height: 240px; background: radial-gradient(circle, rgba(26,26,26,0.04) 0%, transparent 70%); }

    /* Brand */
    .brand {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: calc(60px + env(safe-area-inset-top,0px)) 32px 32px;
      animation: fadeDown 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    .brand-icon {
      width: 80px; height: 80px; background: var(--accent); border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .brand-icon svg { width: 44px; height: 44px; }
    .brand-name { font-family: var(--font-serif); font-size: 48px; color: var(--text-primary); letter-spacing: -1px; margin-bottom: 10px; }
    .brand-sub  { font-size: 16px; color: var(--text-secondary); text-align: center; line-height: 1.5; max-width: 260px; }

    /* Card */
    .card {
      background: var(--surface); border-radius: 28px 28px 0 0;
      padding: 32px 24px calc(32px + env(safe-area-inset-bottom,0px));
      box-shadow: 0 -4px 32px rgba(0,0,0,0.07);
      animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    /* Google button */
    .btn-google {
      width: 100%; padding: 16px 20px;
      background: var(--surface); color: var(--text-primary);
      border: 1.5px solid var(--border); border-radius: 16px;
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      -webkit-tap-highlight-color: transparent; position: relative;
    }
    .btn-google:active { transform: scale(0.98); opacity: 0.9; }
    .btn-google.loading { pointer-events: none; opacity: 0.7; }
    .google-logo { width: 22px; height: 22px; flex-shrink: 0; }
    .btn-spinner { width: 20px; height: 20px; border: 2px solid rgba(26,26,26,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-google.loading .btn-spinner { display: block; }
    .btn-google.loading .btn-text, .btn-google.loading .google-logo { display: none; }

    .divider { display: flex; align-items: center; gap: 12px; color: var(--text-hint); font-size: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Services grid */
    .services { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .service-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .service-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .service-label { font-size: 10.5px; color: var(--text-hint); text-align: center; }

    .footer { text-align: center; font-size: 11.5px; color: var(--text-hint); line-height: 1.6; margin-top: 8px; }
    .footer a { color: var(--text-secondary); }

    /* PWA Banner */
    .pwa-bar {
      display: none; background: var(--accent); color: white;
      padding: 12px 20px; border-radius: 14px; margin-bottom: 16px;
      align-items: center; gap: 10px; cursor: pointer;
      animation: fadeIn 0.3s ease both;
    }
    .pwa-bar.show { display: flex; }
    .pwa-bar-text { flex: 1; font-size: 13.5px; font-weight: 500; }
    .pwa-bar-btn  { font-size: 12px; background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 8px; white-space: nowrap; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp  { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M256 80 L278 234 L432 256 L278 278 L256 432 L234 278 L80 256 L234 234 Z" fill="white" opacity="0.95"/>
        <path d="M390 72 L398 118 L444 126 L398 134 L390 180 L382 134 L336 126 L382 118 Z" fill="white" opacity="0.55"/>
        <path d="M122 332 L128 364 L160 370 L128 376 L122 408 L116 376 L84 370 L116 364 Z" fill="white" opacity="0.35"/>
      </svg>
    </div>
    <h1 class="brand-name">Gabriel</h1>
    <p class="brand-sub">Seu assistente pessoal com IA e integração completa com o Google</p>
  </div>

  <!-- Card login -->
  <div class="card">

    <!-- PWA Install bar -->
    <div class="pwa-bar" id="pwa-bar" onclick="installPWA()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      <span class="pwa-bar-text">Instalar Gabriel no celular</span>
      <span class="pwa-bar-btn">Instalar</span>
    </div>

    <!-- Google login btn -->
    <button class="btn-google" id="btn-google" onclick="doGoogleLogin()">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span class="btn-text">Entrar com Google</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">conecta com</div>

    <!-- Services -->
    <div class="services">
      <div class="service-item">
        <div class="service-icon" style="background:#E8F0FE">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <span class="service-label">Gmail</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#E6F4EA">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#34A853" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        </div>
        <span class="service-label">Agenda</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#FEF7E0">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#FBBC04" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
        </div>
        <span class="service-label">Drive</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#FDE8E8">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#EA4335" d="M21 3H3C2 3 1 4 1 5v14c0 1 1 2 2 2h5l3 3 3-3h7c1 0 2-1 2-2V5c0-1-1-2-2-2z"/></svg>
        </div>
        <span class="service-label">Keep</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#F3E8FD">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#A142F4" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <span class="service-label">Fotos</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#E8F5E9">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#34A853" d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
        </div>
        <span class="service-label">Translate</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#E8F0FE">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span class="service-label">Localização</span>
      </div>
      <div class="service-item">
        <div class="service-icon" style="background:#F1F3F4">
          <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#5F6368" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        </div>
        <span class="service-label">Seguro</span>
      </div>
    </div>

    <p class="footer">
      Ao entrar você concorda com os <a href="termosservicos.html">Termos de uso</a>.<br>
      Seus dados ficam no seu dispositivo e no Google Drive.
    </p>

  </div>
</div>

<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="db.js"></script>
<script src="google.js"></script>
<script src="auth.js"></script>
<script>
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // PWA Install
  let deferredPrompt = null;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

  if (!isStandalone) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwa-bar').classList.add('show');
    });
  }

  async function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('pwa-bar').classList.remove('show');
      deferredPrompt = null;
    }
  }

  // Guard — se já conectado vai para dashboard
  window.addEventListener('DOMContentLoaded', async () => {
    if (Google.isConnected() && Google.isTokenValid()) {
      window.location.replace('dashboard.html');
    }
  });

  function doGoogleLogin() {
    const btn = document.getElementById('btn-google');
    btn.classList.add('loading');
    Google.connect();
  }
</script>
</body>
</html>

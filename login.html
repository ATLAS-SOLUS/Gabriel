<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Gabriel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:      #FFFFFF;
      --bg:         #F7F7F5;
      --surface:    #FFFFFF;
      --border:     #E8E8E4;
      --border-focus: #1A1A1A;
      --text-primary:   #1A1A1A;
      --text-secondary: #767672;
      --text-hint:      #ABABAB;
      --accent:     #1A1A1A;
      --accent-soft:#F0F0EE;
      --danger:     #D94040;
      --success:    #2E7D5E;
      --radius-sm:  10px;
      --radius-md:  16px;
      --radius-lg:  24px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.08);
      --font-sans:  'DM Sans', sans-serif;
      --font-serif: 'DM Serif Display', serif;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
    }

    /* ── App Shell ─────────────────────────────────────── */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── Background decorativo ─────────────────────────── */
    .bg-decoration {
      position: absolute;
      top: -80px;
      right: -60px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, #F0EFE9 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .bg-decoration-2 {
      position: absolute;
      bottom: 30%;
      left: -80px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #EDF0EB 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header / Brand ────────────────────────────────── */
    .brand-area {
      position: relative;
      z-index: 1;
      padding: 72px 32px 40px;
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
    }

    .brand-icon .material-icons-round {
      color: white;
      font-size: 26px;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 38px;
      line-height: 1.1;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .brand-subtitle {
      margin-top: 8px;
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0;
    }

    /* ── Card principal ────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 32px 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    /* ── Tab switcher ──────────────────────────────────── */
    .tab-bar {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 32px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ── Forms ─────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .form-panel {
      display: none;
      animation: fadeIn 0.25s ease both;
    }
    .form-panel.active { display: flex; flex-direction: column; gap: 16px; }

    .field {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      color: var(--text-hint);
      font-size: 20px;
      pointer-events: none;
      transition: color var(--transition);
    }

    .field-input {
      width: 100%;
      padding: 14px 14px 14px 46px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
      -webkit-appearance: none;
    }

    .field-input::placeholder { color: var(--text-hint); }

    .field-input:focus {
      border-color: var(--border-focus);
      background: var(--surface);
    }

    .field-input:focus + .field-icon,
    .field-wrap:focus-within .field-icon {
      color: var(--text-primary);
    }

    /* Toggle senha */
    .toggle-pass {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-hint);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color var(--transition);
    }
    .toggle-pass:hover { color: var(--text-primary); }
    .toggle-pass .material-icons-round { font-size: 20px; }

    /* ── Botão principal ───────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: transform var(--transition), opacity var(--transition);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; pointer-events: none; }

    .btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .btn-spinner { display: block; }

    /* ── Mensagem de erro/sucesso ──────────────────────── */
    .msg {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease both;
    }
    .msg.show { display: flex; }
    .msg.error   { background: #FFF0F0; color: var(--danger); }
    .msg.success { background: #F0FFF8; color: var(--success); }
    .msg .material-icons-round { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    /* ── Divisor ───────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-hint);
      font-size: 12px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Força da senha ────────────────────────────────── */
    .password-strength {
      display: none;
      gap: 4px;
      margin-top: -8px;
    }
    .password-strength.show { display: flex; }
    .strength-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      transition: background 0.3s ease;
    }
    .strength-bar.weak   { background: var(--danger); }
    .strength-bar.medium { background: #E8A838; }
    .strength-bar.strong { background: var(--success); }

    .strength-label {
      font-size: 11px;
      color: var(--text-hint);
      text-align: right;
      margin-top: 4px;
    }

    /* ── Checkbox termos ───────────────────────────────── */
    .terms-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .terms-check input[type="checkbox"] {
      width: 18px; height: 18px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .terms-check-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .terms-check-text a {
      color: var(--text-primary);
      font-weight: 500;
      text-decoration: underline;
      text-decoration-color: var(--border);
    }

    /* ── Footer ────────────────────────────────────────── */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 24px;
      padding-bottom: 8px;
    }

    /* ── Animations ────────────────────────────────────── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Safe area (iPhone notch) ──────────────────────── */
    @supports (padding-top: env(safe-area-inset-top)) {
      .brand-area { padding-top: calc(64px + env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="bg-decoration"></div>
  <div class="bg-decoration-2"></div>

  <!-- Brand -->
  <div class="brand-area">
    <div class="brand-icon">
      <span class="material-icons-round">auto_awesome</span>
    </div>
    <h1 class="brand-title">Gabriel</h1>
    <p class="brand-subtitle">Seu assistente pessoal inteligente</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Tabs -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" id="tab-login" role="tab" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" id="tab-register" role="tab" onclick="switchTab('register')">Criar conta</button>
    </div>

    <!-- Mensagem global -->
    <div class="msg" id="msg" role="alert">
      <span class="material-icons-round" id="msg-icon">error</span>
      <span id="msg-text"></span>
    </div>

    <!-- ── PAINEL LOGIN ── -->
    <div class="form-panel active" id="panel-login">

      <div class="field">
        <label class="field-label" for="login-email">E-mail</label>
        <div class="field-wrap">
          <input class="field-input" type="email" id="login-email"
            placeholder="seu@email.com" autocomplete="email"
            inputmode="email" enterkeyhint="next">
          <span class="material-icons-round field-icon">mail_outline</span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="login-password">Senha</label>
        <div class="field-wrap">
          <input class="field-input" type="password" id="login-password"
            placeholder="••••••••" autocomplete="current-password"
            enterkeyhint="go" onkeydown="if(event.key==='Enter') doLogin()">
          <span class="material-icons-round field-icon">lock_outline</span>
          <button class="toggle-pass" type="button" onclick="togglePass('login-password', this)" tabindex="-1">
            <span class="material-icons-round">visibility_off</span>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="btn-login" onclick="doLogin()">
        <span class="btn-text">Entrar</span>
        <div class="btn-spinner"></div>
      </button>

    </div>

    <!-- ── PAINEL CADASTRO ── -->
    <div class="form-panel" id="panel-register">

      <div class="field">
        <label class="field-label" for="reg-name">Nome</label>
        <div class="field-wrap">
          <input class="field-input" type="text" id="reg-name"
            placeholder="Como posso te chamar?" autocomplete="name"
            enterkeyhint="next">
          <span class="material-icons-round field-icon">person_outline</span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="reg-email">E-mail</label>
        <div class="field-wrap">
          <input class="field-input" type="email" id="reg-email"
            placeholder="seu@email.com" autocomplete="email"
            inputmode="email" enterkeyhint="next">
          <span class="material-icons-round field-icon">mail_outline</span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="reg-password">Senha</label>
        <div class="field-wrap">
          <input class="field-input" type="password" id="reg-password"
            placeholder="Mínimo 6 caracteres" autocomplete="new-password"
            enterkeyhint="next" oninput="checkStrength(this.value)">
          <span class="material-icons-round field-icon">lock_outline</span>
          <button class="toggle-pass" type="button" onclick="togglePass('reg-password', this)" tabindex="-1">
            <span class="material-icons-round">visibility_off</span>
          </button>
        </div>
        <!-- Força da senha -->
        <div class="password-strength" id="strength-bars">
          <div class="strength-bar" id="bar-1"></div>
          <div class="strength-bar" id="bar-2"></div>
          <div class="strength-bar" id="bar-3"></div>
          <div class="strength-bar" id="bar-4"></div>
        </div>
        <div class="strength-label" id="strength-label" style="display:none"></div>
      </div>

      <div class="field">
        <label class="field-label" for="reg-confirm">Confirmar senha</label>
        <div class="field-wrap">
          <input class="field-input" type="password" id="reg-confirm"
            placeholder="Repita a senha" autocomplete="new-password"
            enterkeyhint="go" onkeydown="if(event.key==='Enter') doRegister()">
          <span class="material-icons-round field-icon">lock_outline</span>
        </div>
      </div>

      <label class="terms-check">
        <input type="checkbox" id="terms-agree">
        <span class="terms-check-text">
          Li e aceito os <a href="terms.html" onclick="event.stopPropagation()">Termos de uso</a> do Gabriel
        </span>
      </label>

      <button class="btn-primary" id="btn-register" onclick="doRegister()">
        <span class="btn-text">Criar minha conta</span>
        <div class="btn-spinner"></div>
      </button>

    </div>

    <p class="footer-note">Todos os dados ficam armazenados localmente no seu dispositivo.</p>

  </div>
</div>

<!-- Scripts motores -->
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>

<script>
  // ── Registro do Service Worker ───────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Guard: redireciona se já logado ──────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    await Auth.guard('login.html');
  });

  // ── Tab switch ───────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
    hideMsg();
  }

  // ── Mensagens ────────────────────────────────────────
  function showMsg(text, type = 'error') {
    const el   = document.getElementById('msg');
    const icon = document.getElementById('msg-icon');
    const txt  = document.getElementById('msg-text');
    icon.textContent = type === 'error' ? 'error_outline' : 'check_circle_outline';
    txt.textContent  = text;
    el.className     = `msg show ${type}`;
  }

  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  // ── Toggle senha ─────────────────────────────────────
  function togglePass(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon  = btn.querySelector('.material-icons-round');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility_off';
    }
  }

  // ── Força da senha ───────────────────────────────────
  function checkStrength(value) {
    const bars  = document.getElementById('strength-bars');
    const label = document.getElementById('strength-label');

    if (!value) {
      bars.classList.remove('show');
      label.style.display = 'none';
      return;
    }

    bars.classList.add('show');
    label.style.display = 'block';

    let score = 0;
    if (value.length >= 6)  score++;
    if (value.length >= 10) score++;
    if (/[A-Z]/.test(value) && /[0-9]/.test(value)) score++;
    if (/[^A-Za-z0-9]/.test(value)) score++;

    const levels = ['', 'weak', 'medium', 'strong', 'strong'];
    const labels = ['', 'Fraca', 'Razoável', 'Boa', 'Forte'];
    const level  = levels[score];

    ['bar-1','bar-2','bar-3','bar-4'].forEach((id, i) => {
      const bar = document.getElementById(id);
      bar.className = 'strength-bar' + (i < score ? ` ${level}` : '');
    });

    label.textContent  = labels[score];
    label.style.color  = level === 'weak' ? 'var(--danger)'
      : level === 'medium' ? '#E8A838'
      : 'var(--success)';
  }

  // ── Login ────────────────────────────────────────────
  async function doLogin() {
    hideMsg();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('btn-login');

    if (!email || !password) {
      showMsg('Preencha e-mail e senha.');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      await Auth.login(email, password);
      showMsg('Bem-vindo de volta!', 'success');
      setTimeout(async () => {
        const user = await Auth.getCurrentUserFull();
        if (!user?.termosAceitos)      window.location.href = 'terms.html';
        else if (!user?.onboardingDone) window.location.href = 'onboarding.html';
        else                            window.location.href = 'dashboard.html';
      }, 700);
    } catch (err) {
      showMsg(err.message);
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // ── Cadastro ─────────────────────────────────────────
  async function doRegister() {
    hideMsg();
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const agreed   = document.getElementById('terms-agree').checked;
    const btn      = document.getElementById('btn-register');

    if (!name)     { showMsg('Informe seu nome.'); return; }
    if (!email)    { showMsg('Informe seu e-mail.'); return; }
    if (!password) { showMsg('Crie uma senha.'); return; }
    if (password !== confirm) { showMsg('As senhas não coincidem.'); return; }
    if (!agreed)   { showMsg('Aceite os termos para continuar.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      await Auth.register(name, email, password);
      await Auth.acceptTerms();
      showMsg('Conta criada! Vamos começar 🎉', 'success');
      setTimeout(() => { window.location.href = 'onboarding.html'; }, 900);
    } catch (err) {
      showMsg(err.message);
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>

</body>
</html>

# netlify.toml — Configuração do Gabriel no Netlify
# Coloque este arquivo na raiz do repositório

[build]
  # Sem build command — projeto estático puro
  publish = "."
  functions = "netlify/functions"

# ── Redirecionamentos ──────────────────────────────────────

# Callback OAuth do Google
[[redirects]]
  from = "/auth/google/callback"
  to   = "/auth-callback.html"
  status = 200
  force = true

# SPA fallback — todas as rotas apontam para index
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de segurança ───────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(self), geolocation=()"

# PWA — cache agressivo para assets estáticos
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
